# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "GitHub Copilot"

ai_usage_summary: |
  GitHub Copilot for architecture discussion,
  debug issues, refactoring and readme.md creation.
  All scoring logic is deterministic Python using
  scikit-learn ,TF-IDF and rapidfuzz, No LLM is used at runtime.
  No candidate data was processed by any external AI service during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  4-stage evidence-based scoring pipeline. 
  - "Stage 1: Integrity Gate detects honeypots via timeline physics, skill inflation, and overlapping dates."
  - "Stage 2 (65%): Technical Fit — TF-IDF semantic similarity to JD, career evidence extraction, fuzzy skill matching with 40+ aliases, skill-to-career cross-verification with trust scoring, role alignment for Senior AI Engineer." 
  - "Stage 3 (20%): Hiring Feasibility — response rate, recency, notice period, location."
  - "Stage 4 (15%): Credibility — GitHub, platform assessments, education, career velocity."
  Key USP: skills without career proof get discounted; semantic matching catches vocabulary"
  variation; fraud detection at scoring layer. Runtime: ~3s for 10K on CPU.

